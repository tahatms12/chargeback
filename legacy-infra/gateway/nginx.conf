worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream chargeguard_upstream {
    server ${CHARGEBACK_UPSTREAM_HOST}:${CHARGEBACK_UPSTREAM_PORT};
  }

  upstream customsready_upstream {
    server ${CUSTOMSREADY_UPSTREAM_HOST}:${CUSTOMSREADY_UPSTREAM_PORT};
  }

  upstream poref_upstream {
    server ${POREF_UPSTREAM_HOST}:${POREF_UPSTREAM_PORT};
  }

  upstream fixitcsv_upstream {
    server ${FIXITCSV_UPSTREAM_HOST}:${FIXITCSV_UPSTREAM_PORT};
  }

  upstream makerqueue_upstream {
    server ${CRAFTLINE_UPSTREAM_HOST}:${CRAFTLINE_UPSTREAM_PORT};
  }

  upstream stagewise_upstream {
    server ${STAGEWISE_UPSTREAM_HOST}:${STAGEWISE_UPSTREAM_PORT};
  }

  server {
    listen 8080;
    server_name chargeguard.uplifttechnologies.pro;

    location / {
      proxy_pass http://chargeguard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }
  }

  server {
    listen 8080;
    server_name customsready.uplifttechnologies.pro;

    location / {
      proxy_pass http://customsready_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }
  }

  server {
    listen 8080;
    server_name poref.uplifttechnologies.pro;

    location / {
      proxy_pass http://poref_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }
  }

  server {
    listen 8080;
    server_name fixitcsv.uplifttechnologies.pro;

    location / {
      proxy_pass http://fixitcsv_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }
  }

  server {
    listen 8080;
    server_name makerqueue.uplifttechnologies.pro;

    location / {
      proxy_pass http://makerqueue_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }
  }

  server {
    listen 8080;
    server_name stagewise.uplifttechnologies.pro;

    location / {
      proxy_pass http://stagewise_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }
  }
}
