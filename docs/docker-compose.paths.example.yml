# DOCUMENTATION EXAMPLE ONLY — DO NOT RUN THIS FILE DIRECTLY.
# This file shows an illustrative path-based gateway topology with external service placeholders.
# Canonical executable compose entrypoint for this repo is ../docker-compose.yml (see scripts/run-all.sh).
# Copy this file to a deployment-specific compose file and replace every placeholder service before use.

version: "3.9"

services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - chargeback
      - customsready
      - poref
      - fixitcsv
    ports:
      - "80:8080"
    environment:
      CHARGEBACK_UPSTREAM_HOST: ${CHARGEBACK_UPSTREAM_HOST:-chargeback}
      CHARGEBACK_UPSTREAM_PORT: ${CHARGEBACK_UPSTREAM_PORT:-3000}
      CUSTOMSREADY_UPSTREAM_HOST: ${CUSTOMSREADY_UPSTREAM_HOST:-customsready}
      CUSTOMSREADY_UPSTREAM_PORT: ${CUSTOMSREADY_UPSTREAM_PORT:-3000}
      POREF_UPSTREAM_HOST: ${POREF_UPSTREAM_HOST:-poref}
      POREF_UPSTREAM_PORT: ${POREF_UPSTREAM_PORT:-3000}
      FIXITCSV_UPSTREAM_HOST: ${FIXITCSV_UPSTREAM_HOST:-fixitcsv}
      FIXITCSV_UPSTREAM_PORT: ${FIXITCSV_UPSTREAM_PORT:-3000}
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    command: >
      /bin/sh -c "envsubst '$$CHARGEBACK_UPSTREAM_HOST $$CHARGEBACK_UPSTREAM_PORT $$CUSTOMSREADY_UPSTREAM_HOST $$CUSTOMSREADY_UPSTREAM_PORT $$POREF_UPSTREAM_HOST $$POREF_UPSTREAM_PORT $$FIXITCSV_UPSTREAM_HOST $$FIXITCSV_UPSTREAM_PORT' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

  # Chargeback app is intentionally externalized from this repo to preserve immutability.
  # Point CHARGEBACK_UPSTREAM_HOST/PORT to its service in your target runtime.
  chargeback:
    image: nginx:1.27-alpine
    command: ["/bin/sh", "-c", "echo 'Attach real chargeback service in production' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]

  customsready:
    build:
      context: ./customsready
      dockerfile: Dockerfile
    env_file:
      - ./customsready/.env.compose
    environment:
      PORT: 3000
      CUSTOMSREADY_SHOPIFY_APP_URL: ${CUSTOMSREADY_PUBLIC_BASE_URL:-https://customsready.uplifttechnologies.pro}
      CUSTOMSREADY_NODE_ENV: production
      REDIS_URL: redis://${CUSTOMSREADY_REDIS_HOST:-customsready-redis}:${CUSTOMSREADY_REDIS_PORT:-6379}
      DATABASE_URL: postgresql://${CUSTOMSREADY_POSTGRES_USER:-postgres}:${CUSTOMSREADY_POSTGRES_PASSWORD:-password}@${CUSTOMSREADY_POSTGRES_HOST:-customsready-db}:${CUSTOMSREADY_POSTGRES_PORT:-5432}/${CUSTOMSREADY_POSTGRES_DB:-customsready_lite}
    depends_on:
      customsready-db:
        condition: service_healthy
      customsready-redis:
        condition: service_healthy

  customsready-catalog-worker:
    build:
      context: ./customsready
      dockerfile: Dockerfile
    env_file:
      - ./customsready/.env.compose
    environment:
      REDIS_URL: redis://${CUSTOMSREADY_REDIS_HOST:-customsready-redis}:${CUSTOMSREADY_REDIS_PORT:-6379}
      DATABASE_URL: postgresql://${CUSTOMSREADY_POSTGRES_USER:-postgres}:${CUSTOMSREADY_POSTGRES_PASSWORD:-password}@${CUSTOMSREADY_POSTGRES_HOST:-customsready-db}:${CUSTOMSREADY_POSTGRES_PORT:-5432}/${CUSTOMSREADY_POSTGRES_DB:-customsready_lite}
    command: ["npx", "tsx", "app/jobs/catalogAudit.worker.ts"]
    restart: unless-stopped
    depends_on:
      customsready-db:
        condition: service_healthy
      customsready-redis:
        condition: service_healthy

  customsready-reaudit-worker:
    build:
      context: ./customsready
      dockerfile: Dockerfile
    env_file:
      - ./customsready/.env.compose
    environment:
      REDIS_URL: redis://${CUSTOMSREADY_REDIS_HOST:-customsready-redis}:${CUSTOMSREADY_REDIS_PORT:-6379}
      DATABASE_URL: postgresql://${CUSTOMSREADY_POSTGRES_USER:-postgres}:${CUSTOMSREADY_POSTGRES_PASSWORD:-password}@${CUSTOMSREADY_POSTGRES_HOST:-customsready-db}:${CUSTOMSREADY_POSTGRES_PORT:-5432}/${CUSTOMSREADY_POSTGRES_DB:-customsready_lite}
    command: ["npx", "tsx", "app/jobs/productReaudit.worker.ts"]
    restart: unless-stopped
    depends_on:
      customsready-db:
        condition: service_healthy
      customsready-redis:
        condition: service_healthy

  customsready-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customsready_lite
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  customsready-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  poref:
    image: nginx:1.27-alpine
    command: ["/bin/sh", "-c", "echo 'Attach real poref runtime in production' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
    environment:
      POREF_SHOPIFY_APP_URL: ${POREF_PUBLIC_BASE_URL:-https://poref.uplifttechnologies.pro}
      POREF_NODE_ENV: production

  fixitcsv:
    build:
      context: ./FixitCSV
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      SHOPIFY_APP_URL: ${FIXITCSV_PUBLIC_BASE_URL:-https://fixitcsv.uplifttechnologies.pro}
      NODE_ENV: production
