worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream chargeback_upstream {
    server ${CHARGEBACK_UPSTREAM_HOST}:${CHARGEBACK_UPSTREAM_PORT};
  }

  upstream customsready_upstream {
    server ${CUSTOMSREADY_UPSTREAM_HOST}:${CUSTOMSREADY_UPSTREAM_PORT};
  }

  upstream poref_upstream {
    server ${POREF_UPSTREAM_HOST}:${POREF_UPSTREAM_PORT};
  }

  upstream fixitcsv_upstream {
    server ${FIXITCSV_UPSTREAM_HOST}:${FIXITCSV_UPSTREAM_PORT};
  }

  server {
    listen 8080;
    server_name _;

    # Old marketing/web frontend is intentionally disabled.
    location = / {
      add_header Content-Type text/plain;
      return 410 "Root website disabled. Use /chargeback, /customsready, /poref, or /fixitcsv.\n";
    }

    location /chargeback/ {
      rewrite ^/chargeback/?(.*)$ /$1 break;
      proxy_pass http://chargeback_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /chargeback;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }

    location = /chargeback {
      return 308 /chargeback/;
    }

    location /customsready/ {
      rewrite ^/customsready/?(.*)$ /$1 break;
      proxy_pass http://customsready_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /customsready;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }

    location = /customsready {
      return 308 /customsready/;
    }

    location /poref/ {
      rewrite ^/poref/?(.*)$ /$1 break;
      proxy_pass http://poref_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /poref;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }

    location = /poref {
      return 308 /poref/;
    }


    location /fixitcsv/ {
      rewrite ^/fixitcsv/?(.*)$ /$1 break;
      proxy_pass http://fixitcsv_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /fixitcsv;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300;
      proxy_send_timeout 300;
    }

    location = /fixitcsv {
      return 308 /fixitcsv/;
    }

    location / {
      return 404;
    }
  }
}
