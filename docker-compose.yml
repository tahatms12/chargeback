version: "3.9"

# Development compose only. For production use a proper orchestrator.
# MinIO credentials come from .env — never hardcoded.
# --reload is absent from the api command intentionally.

services:
  postgres:
    image: postgres:15-alpine
    container_name: chargeguard-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chargeguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chargeguard}
      POSTGRES_DB: ${POSTGRES_DB:-chargeguard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chargeguard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chargeguard-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: chargeguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${MINIO_HOST:-minio}:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: chargeguard-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-chargeguard-evidence}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://${MINIO_HOST:-minio}:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set none local/$${S3_BUCKET};
      echo 'MinIO setup done';
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chargeguard-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chargeguard}:${POSTGRES_PASSWORD:-chargeguard}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-chargeguard}
      REDIS_URL: redis://${REDIS_HOST:-redis}:6379/0
      S3_ENDPOINT_URL: http://${MINIO_HOST:-minio}:9000
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chargeguard-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chargeguard}:${POSTGRES_PASSWORD:-chargeguard}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-chargeguard}
      REDIS_URL: redis://${REDIS_HOST:-redis}:6379/0
      S3_ENDPOINT_URL: http://${MINIO_HOST:-minio}:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.services.deadline

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chargeguard-web
    environment:
      NEXT_PUBLIC_API_URL: http://${API_HOST:-api}:${API_PORT:-8000}
      NEXT_PUBLIC_SHOPIFY_API_KEY: ${SHOPIFY_API_KEY}
      # SHOPIFY_API_SECRET intentionally absent — lives only in api container
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
