version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-customsready_lite}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  customsready:
    build:
      context: ./customsready
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: ${CUSTOMSREADY_PORT:-3100}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/customsready_lite}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SHOPIFY_APP_URL: ${SHOPIFY_APP_URL:-http://localhost:8080/customsready}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  customsready-catalog-worker:
    build:
      context: ./customsready
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/customsready_lite}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npx", "tsx", "app/jobs/catalogAudit.worker.ts"]

  customsready-reaudit-worker:
    build:
      context: ./customsready
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/customsready_lite}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npx", "tsx", "app/jobs/productReaudit.worker.ts"]

  fixitcsv:
    build:
      context: ./FixitCSV
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PORT: ${FIXITCSV_PORT:-3200}
      SHOPIFY_APP_URL: ${FIXITCSV_APP_URL:-http://localhost:8080/fixitcsv}
      DATABASE_URL: ${FIXITCSV_DATABASE_URL:-file:./prisma/dev.db}
    command: ["sh", "-c", "npx prisma migrate deploy && npm run start"]

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - customsready
      - fixitcsv
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      CHARGEBACK_UPSTREAM_HOST: ${CHARGEBACK_UPSTREAM_HOST:-customsready}
      CHARGEBACK_UPSTREAM_PORT: ${CHARGEBACK_UPSTREAM_PORT:-3100}
      CUSTOMSREADY_UPSTREAM_HOST: ${CUSTOMSREADY_UPSTREAM_HOST:-customsready}
      CUSTOMSREADY_UPSTREAM_PORT: ${CUSTOMSREADY_UPSTREAM_PORT:-3100}
      POREF_UPSTREAM_HOST: ${POREF_UPSTREAM_HOST:-fixitcsv}
      POREF_UPSTREAM_PORT: ${POREF_UPSTREAM_PORT:-3200}
      FIXITCSV_UPSTREAM_HOST: ${FIXITCSV_UPSTREAM_HOST:-fixitcsv}
      FIXITCSV_UPSTREAM_PORT: ${FIXITCSV_UPSTREAM_PORT:-3200}
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    command: >
      /bin/sh -c "envsubst '$$CHARGEBACK_UPSTREAM_HOST $$CHARGEBACK_UPSTREAM_PORT $$CUSTOMSREADY_UPSTREAM_HOST $$CUSTOMSREADY_UPSTREAM_PORT $$POREF_UPSTREAM_HOST $$POREF_UPSTREAM_PORT $$FIXITCSV_UPSTREAM_HOST $$FIXITCSV_UPSTREAM_PORT' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

volumes:
  postgres_data:
  redis_data:
