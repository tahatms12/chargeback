name = "PORef"
client_id = "f1f6c46cef65eb4c90663b2bc88fd1e6"
application_url = "https://poref.uplifttechnologies.pro"
embedded = true

[auth]
redirect_urls = [
  "https://poref.uplifttechnologies.pro/auth/callback",
  "https://poref.uplifttechnologies.pro/auth/shopify/callback",
  "https://poref.uplifttechnologies.pro/api/auth/callback"
]

[access_scopes]
# read_all_orders justified: merchants require search across historical orders
# (>60 days) for AP reconciliation against buyer PO numbers.
scopes = "read_orders,write_orders,read_all_orders,read_customers"

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks"

[webhooks.privacy_compliance]
customer_deletion_url = "https://poref.uplifttechnologies.pro/webhooks"
customer_data_request_url = "https://poref.uplifttechnologies.pro/webhooks"
shop_deletion_url = "https://poref.uplifttechnologies.pro/webhooks"

[app_proxy]
url = "https://poref.uplifttechnologies.pro/proxy"
subpath = "poref"
prefix = "apps"

[pos]
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
include_config_on_deploy = true
