# docker-compose.yml
# Local development environment: app + PostgreSQL + Redis + workers
version: "3.9"

x-customsready-env: &customsready-env
  env_file:
    - ./.env.compose
  environment:
    NODE_ENV: development
    SHOPIFY_API_KEY: ${SHOPIFY_API_KEY}
    SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET}
    SHOPIFY_APP_URL: ${SHOPIFY_APP_URL}
    LOG_LEVEL: debug
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium

services:
  app:
    build:
      context: .
      target: builder
    <<: *customsready-env
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Catalog audit worker
  catalog-worker:
    build:
      context: .
      target: builder
    <<: *customsready-env
    command: npx tsx app/jobs/catalogAudit.worker.ts
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Product re-audit worker
  reaudit-worker:
    build:
      context: .
      target: builder
    <<: *customsready-env
    command: npx tsx app/jobs/productReaudit.worker.ts
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customsready_lite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
