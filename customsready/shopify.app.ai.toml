client_id = "b401118ff3d466cd8ac36857e7ac845f"
name = "CustomsReady Lite"
application_url = "https://customsready.uplifttechnologies.pro"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled", "products/create", "products/update" ]
  uri = "/webhooks"

[webhooks.privacy_compliance]
customer_deletion_url = "https://customsready.uplifttechnologies.pro/webhooks"
customer_data_request_url = "https://customsready.uplifttechnologies.pro/webhooks"
shop_deletion_url = "https://customsready.uplifttechnologies.pro/webhooks"

[access_scopes]
scopes = "read_orders,write_orders,read_products,read_customers"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://customsready.uplifttechnologies.pro/auth/callback"
]

[pos]
embedded = false
