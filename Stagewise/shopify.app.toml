name = "Production Queue Communicator"
client_id = "f20219630bf651859ee3cb2945af43e6"
application_url = "https://stagewise.uplifttechnologies.pro"
embedded = true
handle = "production-queue-communicator"

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""

[access_scopes]
# read_orders: fetch queue orders; write_orders: apply stage tags to orders; read_customers: customer email for notifications
scopes = "read_orders,write_orders,read_customers"

[auth]
redirect_urls = [
  "https://stagewise.uplifttechnologies.pro/auth/callback",
  "https://stagewise.uplifttechnologies.pro/auth/shopify/callback",
  "https://stagewise.uplifttechnologies.pro/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks"

[pos]
embedded = false
