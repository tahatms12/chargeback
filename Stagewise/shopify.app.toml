name = "Production Queue Communicator"
client_id = "00000000000000000000000000000000"
application_url = "https://uplifttechnologies.pro/stagewise"
embedded = true
handle = "production-queue-communicator"

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""

[access_scopes]
# read_orders: fetch queue orders; write_orders: apply stage tags to orders; read_customers: customer email for notifications
scopes = "read_orders,write_orders,read_customers"

[auth]
redirect_urls = [
  "https://uplifttechnologies.pro/stagewise/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

[pos]
embedded = false
