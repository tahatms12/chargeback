name = "PORef"
client_id = "{{SHOPIFY_API_KEY}}"
application_url = "{{SHOPIFY_APP_URL}}"
embedded = true

[access]
admin = true

[access.admin]
direct_api_mode = "online"

[access_scopes]
# read_all_orders justified: merchants require search across historical orders
# (>60 days) for AP reconciliation against buyer PO numbers.
scopes = "read_orders,write_orders,read_all_orders,read_customers"

[webhooks]
api_version = "2025-04"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks"
  compliance_topics = false

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri = "/webhooks"
  compliance_topics = false

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"
  compliance_topics = false

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks"
  compliance_topics = true

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks"
  compliance_topics = true

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks"
  compliance_topics = true

[app_proxy]
url = "{{SHOPIFY_APP_URL}}/proxy"
subpath = "poref"
prefix = "apps"

[pos]
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""
include_config_on_deploy = true

[[extensions]]
name = "PORef Checkout Field"
handle = "poref-checkout"
type = "ui_extension"

  [extensions.targeting]
    [[extensions.targeting.targets]]
    target = "purchase.checkout.block.render"
    module = "./extensions/poref-checkout/src/index.tsx"
    default_placement_reference = "CONTACT"

[[extensions]]
name = "PORef Order Block"
handle = "poref-order-block"
type = "ui_extension"

  [extensions.targeting]
    [[extensions.targeting.targets]]
    target = "admin.order-details.block.render"
    module = "./extensions/poref-order-block/src/index.tsx"

[[extensions]]
name = "PORef Order Action"
handle = "poref-order-action"
type = "ui_extension"

  [extensions.targeting]
    [[extensions.targeting.targets]]
    target = "admin.order-details.action.render"
    module = "./extensions/poref-order-action/src/index.tsx"

[[extensions]]
name = "PORef POS"
handle = "poref-pos"
type = "ui_extension"

  [extensions.targeting]
    [[extensions.targeting.targets]]
    target = "pos.home.tile.render"
    module = "./extensions/poref-pos/src/Tile.tsx"

    [[extensions.targeting.targets]]
    target = "pos.home.modal.render"
    module = "./extensions/poref-pos/src/Modal.tsx"

[[extensions]]
name = "PORef Cart Field"
handle = "poref-cart"
type = "theme_app_extension"
