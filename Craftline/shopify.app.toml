name = "Maker Queue"
client_id = "c8804da311dd652cf7f23b99b5250e84"
application_url = "https://craftline.uplifttechnologies.pro"
embedded = true

[access_scopes]
# read_orders + write_orders: view and tag orders
# read_customers: access customer email for notifications
# read_metafields + write_metafields: store production stage on orders
scopes = "read_orders,write_orders,read_customers,read_metafields,write_metafields"

[auth]
redirect_urls = [
  "https://craftline.uplifttechnologies.pro/auth/callback",
  "https://craftline.uplifttechnologies.pro/auth/shopify/callback",
  "https://craftline.uplifttechnologies.pro/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/fulfilled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks"

[pos]
embedded = false

[build]
include_config_on_deploy = true
